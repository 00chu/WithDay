apiVersion: apps/v1
kind: Deployment
metadata:
  name: withday-backend
  namespace: withday
spec:
  replicas: 1

  strategy:
    type: Recreate

  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600

  selector:
    matchLabels:
      app: withday-backend

  template:
    metadata:
      labels:
        app: withday-backend

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: backend
          image: withday-backend:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 10400

          envFrom:
            - secretRef:
                name: withday-backend-env

          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx512m -XX:+UseContainerSupport"

          readinessProbe:
            tcpSocket:
              port: 10400
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12

          livenessProbe:
            tcpSocket:
              port: 10400
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5

          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              memory: "768Mi"
