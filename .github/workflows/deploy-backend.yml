name: Deploy Backend to k3s

on:
  push:
    branches:
      - main
    paths:
      - "WithDayBack/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/withday-key.pem
          chmod 600 ~/.ssh/withday-key.pem
          ssh-keyscan -T 10 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend to k3s
        run: |
          ssh -i ~/.ssh/withday-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            echo "Move to project"
            cd ~/WithDay

            echo "Pull latest source"
            git fetch origin main
            git reset --hard origin/main

            echo "Build backend docker image"
            cd WithDayBack

            SHORT_SHA=$(git rev-parse --short HEAD)
            IMAGE_NAME="withday-backend:${SHORT_SHA}"

            docker build -t ${IMAGE_NAME} .

            echo "Export docker image"
            docker save ${IMAGE_NAME} -o /tmp/withday-backend-${SHORT_SHA}.tar

            echo "Import image into k3s containerd"
            sudo k3s ctr -n k8s.io images import /tmp/withday-backend-${SHORT_SHA}.tar

            echo "Apply Kubernetes manifests"
            sudo k3s kubectl apply -f k8s/deployment.yaml
            sudo k3s kubectl apply -f k8s/service.yaml

            echo "Update deployment image"
            sudo k3s kubectl set image deployment/withday-backend \
              backend=docker.io/library/${IMAGE_NAME} \
              -n withday

            echo "Wait for rollout"
            sudo k3s kubectl rollout status deployment/withday-backend -n withday --timeout=240s

            echo "Clean temporary image archive"
            rm -f /tmp/withday-backend-${SHORT_SHA}.tar

            echo "Kubernetes status"
            sudo k3s kubectl get pods -n withday
            sudo k3s kubectl get svc -n withday
          EOF
