name: Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # Docker Hub 로그인
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker 이미지 빌드
      - name: Build Docker Image
        run: |
          docker build -t gamjachoi/withday-api:latest ./WithDayBack

      # Docker Hub Push
      - name: Push Docker Image
        run: |
          docker push gamjachoi/withday-api:latest

      # EC2 서버 배포
      - name: Deploy EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            sudo docker pull gamjachoi/withday-api:latest

            sudo docker stop withday-api || true
            sudo docker rm withday-api || true

            sudo docker run -d \
              --name withday-api \
              --restart always \
              -p 10400:10400 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              gamjachoi/withday-api:latest

            sudo docker image prune -f
